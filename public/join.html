<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join Auction — IPL Auction</title>
<link rel="stylesheet" href="/css/main.css">
<style>
  .join-hero {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: radial-gradient(ellipse at 50% 0%, rgba(0,255,136,.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 80%, rgba(0,209,255,.06) 0%, transparent 50%);
  }
  .join-card {
    background: var(--surface, #1a1a2e);
    border: 1px solid rgba(0,255,136,.25);
    border-radius: 20px;
    padding: 44px 40px;
    width: 100%;
    max-width: 480px;
    box-shadow: 0 0 80px rgba(0,255,136,.1), 0 24px 60px rgba(0,0,0,.4);
  }
  .join-logo {
    font-family: 'Orbitron', monospace;
    font-size: 1rem;
    color: var(--muted, #888);
    margin-bottom: 32px;
    letter-spacing: 2px;
  }
  .join-logo span { color: var(--gold, #FFD700); }
  .join-title {
    font-family: 'Orbitron', monospace;
    font-size: 1.6rem;
    color: #00FF88;
    margin-bottom: 8px;
    line-height: 1.2;
  }
  .join-sub {
    color: var(--muted, #888);
    font-size: .86rem;
    margin-bottom: 32px;
  }
  .field-label {
    font-size: .75rem;
    color: var(--muted, #888);
    margin-bottom: 6px;
    display: block;
    letter-spacing: .5px;
    text-transform: uppercase;
  }
  .join-input {
    width: 100%;
    background: rgba(255,255,255,.05);
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 10px;
    padding: 12px 16px;
    color: #fff;
    font-size: .93rem;
    outline: none;
    transition: border-color .2s;
    box-sizing: border-box;
  }
  .join-input:focus { border-color: rgba(0,255,136,.5); }
  .join-select {
    width: 100%;
    background: rgba(255,255,255,.05);
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 10px;
    padding: 12px 16px;
    color: #fff;
    font-size: .93rem;
    outline: none;
    appearance: none;
    cursor: pointer;
    transition: border-color .2s;
    box-sizing: border-box;
  }
  .join-select:focus { border-color: rgba(0,255,136,.5); }
  .join-select option { background: #1a1a2e; }
  .status-msg {
    font-size: .74rem;
    margin-top: 7px;
    min-height: 18px;
    transition: color .2s;
  }
  .field-group { margin-bottom: 20px; }
  .find-row { display: flex; gap: 8px; }
  .find-row .join-input { flex: 1; }
</style>
</head>
<body style="background:var(--bg,#0d0d1a);margin:0;">

<div class="join-hero">
  <div class="join-card">
    <div class="join-logo">IPL <span>AUCTION</span></div>
    <div class="join-title">🎯 Join Auction</div>
    <div class="join-sub">Enter the tournament name and select your team to start bidding in real-time.</div>

    <div class="field-group">
      <label class="field-label" for="j-name">Tournament Name</label>
      <div class="find-row">
        <input id="j-name" class="join-input" type="text" placeholder="e.g. IPL 2025" autocomplete="off">
        <button class="btn btn-outline btn-sm" id="btn-find" onclick="lookupTournament()">FIND</button>
      </div>
      <div id="j-status" class="status-msg"></div>
    </div>

    <div id="team-section" style="display:none;">
      <div class="field-group">
        <label class="field-label" for="j-team">Your Team</label>
        <select id="j-team" class="join-select">
          <option value="">— Select a team —</option>
        </select>
      </div>

      <button class="btn btn-green" id="btn-join" onclick="submitJoin()" style="width:100%;padding:14px;font-size:.95rem;" disabled>
        🏏 JOIN AUCTION →
      </button>
    </div>

    <div style="margin-top:24px;text-align:center;font-size:.76rem;color:var(--muted);">
      Are you the auction host? <a href="/login" style="color:var(--cyan);text-decoration:none;">Log in instead →</a>
    </div>
  </div>
</div>

<script>
let auctionData = null;

document.getElementById('j-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') lookupTournament();
});

document.getElementById('j-team').addEventListener('change', function() {
  document.getElementById('btn-join').disabled = !this.value;
});

async function lookupTournament() {
  const name = document.getElementById('j-name').value.trim();
  const statusEl = document.getElementById('j-status');
  const btn = document.getElementById('btn-find');
  if (!name) { statusEl.textContent = '⚠️ Please enter a tournament name.'; statusEl.style.color = 'var(--red)'; return; }

  btn.disabled = true; btn.textContent = '...';
  statusEl.textContent = 'Searching...'; statusEl.style.color = 'var(--muted)';

  try {
    const r = await fetch(`/api/auctions/public/${encodeURIComponent(name)}/teams`);
    if (!r.ok) {
      statusEl.textContent = '❌ Tournament not found. Check the name and try again.';
      statusEl.style.color = 'var(--red)';
      document.getElementById('team-section').style.display = 'none';
      return;
    }
    const { auction, teams } = await r.json();
    auctionData = auction;
    statusEl.textContent = `✅ Found: "${auction.name}" · ${auction.status.toUpperCase()} · ${teams.length} teams`;
    statusEl.style.color = 'var(--green)';

    const sel = document.getElementById('j-team');
    sel.innerHTML = '<option value="">— Select a team —</option>' +
      teams.map(t => `<option value="${t.id}">${t.emoji || '🏏'} ${t.name}</option>`).join('');
    document.getElementById('team-section').style.display = 'block';
    document.getElementById('btn-join').disabled = true;
  } catch(e) {
    statusEl.textContent = '❌ Connection error. Is the server running?';
    statusEl.style.color = 'var(--red)';
  } finally {
    btn.disabled = false; btn.textContent = 'FIND';
  }
}

function submitJoin() {
  const sel = document.getElementById('j-team');
  if (!sel.value || !auctionData) return;
  const text = sel.options[sel.selectedIndex].text;
  const teamName = text.replace(/^\S+\s/, '').trim(); // strip emoji prefix
  localStorage.setItem('viewer_auction_id', auctionData.id);
  localStorage.setItem('viewer_team_id', sel.value);
  localStorage.setItem('viewer_team_name', teamName);
  location.href = `/watch/${auctionData.id}`;
}
</script>
</body>
</html>
