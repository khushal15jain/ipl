<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join Auction — IPL Auction</title>
<link rel="stylesheet" href="/css/main.css">
<style>
  :root {
    --primary: #00FF88;
    --secondary: #00d1ff;
    --surface: #0f172a;
    --bg: #020617;
  }
  body.page {
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }
  .join-card {
    background: var(--surface);
    border: 1px solid rgba(0, 255, 136, 0.2);
    border-radius: 20px;
    padding: 40px;
    width: 100%;
    max-width: 480px;
    box-shadow: 0 0 80px rgba(0, 255, 136, 0.08);
    position: relative;
    overflow: hidden;
  }
  .join-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(90deg, var(--primary), var(--secondary));
  }
  .logo-area {
    text-align: center;
    margin-bottom: 32px;
  }
  .logo-area .ipl {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.8rem;
    font-weight: 900;
    letter-spacing: 2px;
    color: #fff;
  }
  .logo-area .ipl span { color: var(--primary); }
  
  .input-group { margin-bottom: 20px; }
  .input-label {
    display: block;
    font-size: 0.75rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
    font-weight: 600;
  }
  .input-field {
    width: 100%;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    padding: 14px 18px;
    color: #fff;
    font-size: 1.1rem;
    outline: none;
    transition: all 0.2s;
  }
  .input-field:focus {
    border-color: var(--primary);
    background: rgba(0, 255, 136, 0.03);
    box-shadow: 0 0 15px rgba(0, 255, 136, 0.1);
  }
  .input-field.code {
    text-transform: uppercase;
    font-family: 'Orbitron', monospace;
    font-weight: 700;
    letter-spacing: 2px;
    text-align: center;
  }
  
  .btn-join {
    width: 100%;
    padding: 16px;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: 700;
    font-family: 'Orbitron', sans-serif;
    cursor: pointer;
    border: none;
    background: linear-gradient(135deg, var(--primary), #00cc6e);
    color: #000;
    transition: all 0.3s;
    margin-top: 10px;
    box-shadow: 0 4px 20px rgba(0, 255, 136, 0.2);
  }
  .btn-join:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(0, 255, 136, 0.3);
  }
  .btn-join:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    filter: grayscale(0.5);
  }
  
  #join-status {
    text-align: center;
    font-size: 0.85rem;
    margin-top: 12px;
    min-height: 20px;
  }
  
  select.input-field {
    appearance: none;
    cursor: pointer;
  }
</style>
</head>
<body class="page">

<div class="join-card">
  <div class="logo-area">
    <div class="ipl">IPL <span>AUCTION</span></div>
    <div style="color:var(--muted);font-size:0.88rem;margin-top:8px;">Participant Entry Portal</div>
  </div>

  <div class="input-group">
    <label class="input-label">Enter Join Code</label>
    <input type="text" id="join-code" class="input-field code" placeholder="IPL1234" maxlength="10">
    <div id="join-status"></div>
  </div>

  <div id="team-selection" style="display:none;">
    <div class="input-group">
      <label class="input-label">Select Your Team</label>
      <select id="team-select" class="input-field" style="font-family:'Rajdhani',sans-serif;font-weight:700;">
        <option value="">— CHOOSE TEAM —</option>
      </select>
    </div>
  </div>

  <button id="btn-submit" class="btn-join" disabled>JOIN AS TEAM OWNER →</button>
  <button id="btn-spectator" class="btn-join" style="display:none; background: linear-gradient(135deg, var(--purple), #8E2DE2); color: #fff; margin-top: 12px;">WATCH LIVE BROADCAST 📺</button>
  
  <div id="direct-link-area" style="display:none; text-align:center; margin-top:16px;">
    <button onclick="copyCurrentLink()" style="background:none; border:none; color:var(--cyan); font-size:0.8rem; cursor:pointer; text-decoration:underline;">🔗 Copy Direct Spectator Link</button>
  </div>
  
  <div style="text-align:center;margin-top:24px;">
    <a href="/login" style="color:var(--muted);font-size:0.8rem;text-decoration:none;">Admin Login</a>
  </div>
</div>

<script>
  const codeInput = document.getElementById('join-code');
  const teamSelect = document.getElementById('team-select');
  const btnSubmit = document.getElementById('btn-submit');
  const statusEl = document.getElementById('join-status');
  const teamSection = document.getElementById('team-selection');
  
  let currentAuction = null;
  let timer = null;

  codeInput.addEventListener('input', () => {
    statusEl.textContent = '';
    teamSection.style.display = 'none';
    document.getElementById('btn-spectator').style.display = 'none';
    btnSubmit.disabled = true;
    
    clearTimeout(timer);
    if (codeInput.value.length >= 4) {
      timer = setTimeout(verifyCode, 600);
    }
  });

  async function verifyCode() {
    const code = codeInput.value.trim().toUpperCase();
    if (!code) return;

    statusEl.textContent = 'Verifying...';
    statusEl.style.color = 'var(--muted)';

    try {
      const r = await fetch(`/api/auctions/public/join/${code}`);
      if (!r.ok) {
        statusEl.textContent = '❌ Invalid Join Code';
        statusEl.style.color = '#ff4d4d';
        return;
      }

      const { auction, teams } = await r.json();
      currentAuction = auction;
      
      statusEl.textContent = `✅ Found: ${auction.name}`;
      statusEl.style.color = 'var(--primary)';
      
      teamSelect.innerHTML = '<option value="">— CHOOSE TEAM —</option>' +
        teams.map(t => `<option value="${t.id}">${t.emoji || '🏏'} ${t.name}</option>`).join('');
      
      teamSection.style.display = 'block';
      document.getElementById('btn-spectator').style.display = 'block';
      document.getElementById('direct-link-area').style.display = 'block';
    } catch (e) {
      statusEl.textContent = '❌ Connection Error';
    }
  }

  function copyCurrentLink() {
    if (!currentAuction) return;
    const url = `${location.origin}/broadcast/${currentAuction.id}`;
    navigator.clipboard.writeText(url).then(() => {
      alert('🔗 Direct Spectator Link copied!');
    });
  }

  teamSelect.addEventListener('change', () => {
    btnSubmit.disabled = !teamSelect.value;
  });

  btnSubmit.addEventListener('click', () => {
    if (!currentAuction || !teamSelect.value) return;
    const teamName = teamSelect.options[teamSelect.selectedIndex].text.replace(/^[^a-zA-Z]+/, '').trim();
    localStorage.setItem('viewer_auction_id', currentAuction.id);
    localStorage.setItem('viewer_team_id',    teamSelect.value);
    localStorage.setItem('viewer_team_name',  teamName);
    location.href = `/watch/${currentAuction.id}`;
  });

  btnSpec.addEventListener('click', () => {
    if (!currentAuction) return;
    location.href = `/broadcast/${currentAuction.id}`;
  });
</script>

</body>
</html>
