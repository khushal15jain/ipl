<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch Auction — IPL Auction</title>
<link rel="stylesheet" href="/css/main.css">
<script src="/socket.io/socket.io.js"></script>
<style>
  .viewer-badge {
    background: linear-gradient(135deg, rgba(0, 255, 136, 0.15), rgba(0, 209, 255, 0.15));
    border: 1px solid rgba(0, 255, 136, 0.3);
    border-radius: 50px;
    padding: 6px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.8rem;
    color: #fff;
    box-shadow: 0 0 15px rgba(0, 255, 136, 0.1);
  }
  .viewer-badge .dot {
    width: 8px; height: 8px; background: #00FF88; border-radius: 50%;
    box-shadow: 0 0 8px #00FF88;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }
  
  .team-bid-row.my-team {
    background: rgba(0, 255, 136, 0.08);
    border-color: rgba(0, 255, 136, 0.4);
    box-shadow: inset 0 0 20px rgba(0, 255, 136, 0.05);
  }
  .team-bid-row.my-team .bid-btn {
    background: #00FF88;
    color: #000;
  }
  
  .bid-btn:not(.my-team-btn) {
    display: none;
  }
  
  .read-only-tag {
    font-size: 0.65rem;
    color: var(--muted);
    font-weight: 700;
    text-transform: uppercase;
  }
  
  /* Confetti/SOLD styles are already in main.css or were in auction.html, I'll re-include essential ones here if needed or assume main.css has them */
</style>
</head>
<body class="page">

<div class="topbar">
  <div style="display:flex;align-items:center;gap:16px;">
    <div class="logo">IPL <span>AUCTION</span></div>
    <div class="viewer-badge">
      <div class="dot"></div>
      <span>YOU ARE: <b id="my-team-name" style="color:#00FF88;">...</b></span>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:16px;">
    <div class="scorebug">
      <div class="sb-item"><div class="sb-val" id="sb-sold">0</div><div class="sb-lbl">SOLD</div></div>
      <div class="sb-item"><div class="sb-val" id="sb-rem">0</div><div class="sb-lbl">REMAINING</div></div>
    </div>
    <a href="/dashboard" class="btn btn-outline btn-sm">← EXIT</a>
  </div>
</div>

<div class="auction-layout">
  <!-- LEFT: Stage -->
  <div class="stage">
    <div style="display:flex;gap:12px;margin-bottom:16px;justify-content:center;">
      <div class="stat-chip"><div class="val countdown" id="countdown">30</div><div class="lbl">TIMER</div></div>
      <div class="stat-chip"><div class="val" id="st-bid" style="color:var(--green);">₹ 0Cr</div><div class="lbl">CURRENT BID</div></div>
    </div>

    <div class="player-card" id="player-card">
      <div class="player-photo" id="st-photo">🏏</div>
      <div class="player-name" id="st-name">Waiting for auctioneer...</div>
      <div class="player-meta">
        <span class="role-badge rb-bat" id="st-role">—</span>
        <span style="color:var(--muted);font-size:.83rem;" id="st-age">Age: —</span>
      </div>
      <div class="base-box">
        <div class="label">Base Price</div>
        <div class="price" id="st-base">₹ —</div>
      </div>
      <div class="cur-bid" id="st-cur-bid">Connecting to live feed...</div>
    </div>
    
    <!-- BIG BID BUTTON FOR MY TEAM -->
    <div style="margin-top:24px; text-align:center;">
       <button id="main-bid-btn" class="btn btn-green" style="width:100%; max-width:300px; height:60px; font-size:1.4rem; display:none;" onclick="placeMyBid()">PLACE BID</button>
       <div id="bid-reason" style="margin-top:10px; color:var(--red); font-weight:700; font-family:'Orbitron',sans-serif; font-size:0.8rem;"></div>
    </div>

    <div style="margin-top:20px;width:100%;max-width:400px;margin-left:auto;margin-right:auto;">
      <div class="prog-wrap">
        <div class="prog-labels"><span id="prog-lbl">Progress</span><span id="prog-pct">0%</span></div>
        <div class="prog-track"><div class="prog-bar" id="prog-bar" style="width:0%"></div></div>
      </div>
    </div>
  </div>

  <!-- RIGHT: Bidding Panel -->
  <div class="bid-panel">
    <div class="panel-hdr">
      <h3>🏟️ TOURNAMENT SQUADS</h3>
    </div>
    
    <div class="teams-list" id="teams-list">
      <!-- Teams populated here -->
    </div>
    
    <div class="bid-log">
      <div class="bid-log-title">📋 Live Updates</div>
      <div id="bid-entries"></div>
    </div>
  </div>
</div>

<!-- SOLD OVERLAY -->
<div class="sold-overlay" id="sold-overlay">
  <div class="confetti-wrap" id="confetti-wrap"></div>
  <div class="sold-word" id="sold-word">SOLD!</div>
  <div style="text-align:center;">
    <div style="font-family:'Rajdhani',sans-serif;font-size:1.8rem;font-weight:700;" id="sold-pname">—</div>
    <div style="font-family:'Orbitron',monospace;font-size:1.2rem;color:var(--green);margin-top:8px;" id="sold-price">₹ 0Cr</div>
    <div style="font-family:'Rajdhani',sans-serif;font-size:1.1rem;color:var(--cyan);margin-top:5px;" id="sold-team">—</div>
  </div>
</div>

<div id="toast"></div>

<script>
const AID = location.pathname.split('/').pop();
const MY_TEAM_ID = parseInt(localStorage.getItem('viewer_team_id'));
const MY_TEAM_NAME = localStorage.getItem('viewer_team_name') || 'Your Team';

const socket = io();
let teams = [], currentPlayer = null, currentBid = 0, currentBidder = null;
let cdInterval = null, cdVal = 30, totalPlayers = 0;
let maxPlayersPerTeam = 11;
let teamPlayerCounts = {};
let bidIncrement = 0.25;

document.getElementById('my-team-name').textContent = MY_TEAM_NAME;

// Join as participant
socket.emit('join_auction', { auctionId: parseInt(AID), teamId: MY_TEAM_ID });

socket.on('auction_state', (state) => {
  teams = state.teams;
  if (state.auction) {
    maxPlayersPerTeam = state.auction.max_players_per_team || 11;
    bidIncrement = state.auction.bid_increment || 0.25;
  }
  if (state.playerCounts) teamPlayerCounts = state.playerCounts;
  totalPlayers = state.pending_count + state.sold_count + state.unsold_count;
  
  document.getElementById('sb-sold').textContent = state.sold_count;
  document.getElementById('sb-rem').textContent = state.pending_count;
  
  if (state.room && state.room.currentPlayer) {
      handlePlayerUp(state.room.currentPlayer, state.room.currentBid, state.room.currentBidder);
  }
  
  renderTeams();
  refreshMyBidButton();
});

socket.on('player_up', ({ player, base_price }) => {
  handlePlayerUp(player, base_price, null);
});

function handlePlayerUp(player, price, bidderId) {
  currentPlayer = player;
  currentBid = price;
  currentBidder = bidderId;
  
  const photo = document.getElementById('st-photo');
  if (player.photo_path) photo.innerHTML = `<img src="${player.photo_path}" alt="${player.name}">`;
  else { photo.textContent = '🏏'; }

  document.getElementById('st-name').textContent = player.name;
  document.getElementById('st-role').textContent = player.role;
  document.getElementById('st-age').textContent = `Age: ${player.age||'—'}`;
  document.getElementById('st-base').textContent = `₹${player.base_price}Cr`;
  document.getElementById('st-bid').textContent = `₹${price}Cr`;
  
  const bidderName = bidderId ? (teams.find(t => t.id === bidderId)?.name || 'Bidder') : 'No bids yet';
  document.getElementById('st-cur-bid').textContent = bidderId ? `${bidderName}: ₹${price}Cr` : 'Place your bid!';
  
  document.getElementById('bid-entries').innerHTML = '';
  document.getElementById('main-bid-btn').style.display = 'inline-block';
  
  startCountdown();
  refreshMyBidButton();
}

socket.on('bid_placed', ({ teamId, teamName, bidAmount }) => {
  currentBid = bidAmount;
  currentBidder = teamId;
  document.getElementById('st-cur-bid').textContent = `${teamName}: ₹${bidAmount}Cr`;
  document.getElementById('st-bid').textContent = `₹${bidAmount}Cr`;
  
  document.querySelectorAll('.team-bid-row').forEach(r => r.classList.remove('highest'));
  const row = document.querySelector(`[data-team-id="${teamId}"]`);
  if (row) row.classList.add('highest');
  
  addBidLog(`${teamName}: ₹${bidAmount}Cr`);
  startCountdown();
  refreshMyBidButton();
});

socket.on('player_sold', ({ player, team, price, sold_count, playerCounts }) => {
  const t = teams.find(x => x.id === team.id);
  if (t) t.spent += price;
  if (playerCounts) teamPlayerCounts = playerCounts;

  document.getElementById('sb-sold').textContent = sold_count;
  clearInterval(cdInterval);
  showOverlay('SOLD!', player.name, `₹${price}Cr`, team.name, true);
  confetti();
  
  setTimeout(() => {
    hideOverlay();
    document.getElementById('st-name').textContent = 'Waiting for next player...';
    document.getElementById('main-bid-btn').style.display = 'none';
    renderTeams();
  }, 2800);
});

socket.on('player_unsold', ({ player, unsold_count }) => {
  document.getElementById('sb-unsold') && (document.getElementById('sb-unsold').textContent = unsold_count);
  clearInterval(cdInterval);
  showOverlay('UNSOLD', player.name, '', '', false);
  setTimeout(() => {
    hideOverlay();
    document.getElementById('st-name').textContent = 'Waiting for next player...';
    document.getElementById('main-bid-btn').style.display = 'none';
  }, 2500);
});

socket.on('auction_complete', () => {
  showToast('🏆 Auction Complete! Redirecting to results...');
  setTimeout(() => location.href = `/results/${AID}`, 3000);
});

socket.on('bid_error', ({ error }) => {
  showToast(`⚠️ ${error}`);
  refreshMyBidButton();
});

function placeMyBid() {
  if (!currentPlayer) return;
  const myTeam = teams.find(t => t.id === MY_TEAM_ID);
  if (!myTeam) return;
  
  const amt = currentBidder === null ? currentPlayer.base_price : parseFloat((currentBid + bidIncrement).toFixed(2));
  
  // Guard
  if ((myTeam.purse - myTeam.spent) < amt) { showToast('Insufficient budget!'); return; }
  if ((teamPlayerCounts[MY_TEAM_ID] || 0) >= maxPlayersPerTeam) { showToast('Squad full!'); return; }
  
  socket.emit('place_bid', { auctionId: parseInt(AID), teamId: MY_TEAM_ID, bidAmount: amt });
}

function refreshMyBidButton() {
  const btn = document.getElementById('main-bid-btn');
  const reason = document.getElementById('bid-reason');
  const myTeam = teams.find(t => t.id === MY_TEAM_ID);
  
  if (!myTeam || !currentPlayer) return;
  
  const amt = currentBidder === null ? currentPlayer.base_price : parseFloat((currentBid + bidIncrement).toFixed(2));
  const isFull = (teamPlayerCounts[MY_TEAM_ID] || 0) >= maxPlayersPerTeam;
  const broke = (myTeam.purse - myTeam.spent) < amt;
  const isWinning = currentBidder === MY_TEAM_ID;
  
  btn.disabled = isFull || broke || isWinning;
  
  if (isWinning) {
    btn.textContent = 'YOU ARE HIGH BIDDER';
    btn.classList.add('btn-outline');
    btn.classList.remove('btn-green');
    reason.textContent = '';
  } else {
    btn.textContent = `BID ₹${amt}Cr`;
    btn.classList.add('btn-green');
    btn.classList.remove('btn-outline');
    
    if (isFull) reason.textContent = 'SQUAD LIMIT REACHED';
    else if (broke) reason.textContent = 'INSUFFICIENT BUDGET';
    else reason.textContent = '';
  }
}

function renderTeams() {
  const list = document.getElementById('teams-list');
  list.innerHTML = teams.map((t, i) => {
    const isMyTeam = t.id === MY_TEAM_ID;
    const squadCount = teamPlayerCounts[t.id] || 0;
    return `
    <div class="team-bid-row ${isMyTeam?'my-team':''}" data-team-id="${t.id}">
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="mini-logo">${t.logo_path?`<img src="${t.logo_path}">`:(t.emoji||'🏏')}</div>
        <div>
          <div style="font-family:'Rajdhani',sans-serif;font-size:.92rem;font-weight:700;">${t.name} ${isMyTeam?'(YOU)':''}</div>
          <div style="font-size:.7rem;color:var(--muted);">💰 ₹${(t.purse-t.spent).toFixed(2)}Cr &nbsp;·&nbsp; 👥 ${squadCount}/${maxPlayersPerTeam}</div>
        </div>
      </div>
      <div>
        ${isMyTeam ? '<span class="live-dot"></span>' : '<span class="read-only-tag">WATCHING</span>'}
      </div>
    </div>`;
  }).join('');
}

function startCountdown() {
  cdVal = 30;
  document.getElementById('countdown').textContent = cdVal;
  clearInterval(cdInterval);
  cdInterval = setInterval(() => {
    cdVal--;
    document.getElementById('countdown').textContent = cdVal;
    if (cdVal <= 0) clearInterval(cdInterval);
  }, 1000);
}

function addBidLog(text) {
  const el = document.createElement('div');
  el.className = 'blog-entry';
  el.innerHTML = `<div class="blog-dot"></div>${text}`;
  const parent = document.getElementById('bid-entries');
  parent.insertBefore(el, parent.firstChild);
}

function showOverlay(word, name, price, team, isSold) {
  document.getElementById('sold-word').textContent = word;
  document.getElementById('sold-word').style.color = isSold ? 'var(--gold)' : 'var(--red)';
  document.getElementById('sold-pname').textContent = name;
  document.getElementById('sold-price').textContent = price;
  document.getElementById('sold-team').textContent = team;
  document.getElementById('sold-overlay').classList.add('show');
}
function hideOverlay() { document.getElementById('sold-overlay').classList.remove('show'); }

function confetti() {
  const wrap = document.getElementById('confetti-wrap'); wrap.innerHTML='';
  for(let i=0;i<50;i++){
    const el=document.createElement('div'); el.className='cp';
    el.style.cssText=`left:${Math.random()*100}%;top:-20px;background:hsl(${Math.random()*360},70%,50%);width:10px;height:10px;border-radius:50%;animation:fall ${Math.random()*2+2}s linear forwards;`;
    wrap.appendChild(el);
  }
}

function showToast(msg) {
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}
</script>

<style>
  @keyframes fall {
    to { transform: translateY(100vh) rotate(360deg); opacity: 0; }
  }
  .cp { position: absolute; pointer-events: none; }
</style>

</body>
</html>
