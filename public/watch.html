<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Viewer — IPL Auction</title>
<link rel="stylesheet" href="/css/main.css">
<script src="/socket.io/socket.io.js"></script>
<style>
/* ── Viewer badge ─────────────────────────────────────── */
.viewer-badge {
  display: flex; align-items: center; gap: 8px;
  background: linear-gradient(135deg, rgba(0,255,136,.15), rgba(0,209,255,.1));
  border: 1px solid rgba(0,255,136,.3);
  border-radius: 20px; padding: 5px 14px;
  font-family: 'Orbitron', monospace; font-size: .72rem;
  color: #00FF88; white-space: nowrap;
}
.viewer-badge .vb-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: #00FF88; animation: vbpulse 1.5s infinite;
}
@keyframes vbpulse { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:.4;transform:scale(.7);} }

/* ── Watch layout ─────────────────────────────────────── */
.watch-layout {
  display: grid;
  grid-template-columns: 1fr 400px;
  gap: 18px;
  padding: 18px;
  max-width: 1300px;
  margin: 0 auto;
  min-height: calc(100vh - 60px);
}
@media (max-width: 900px) {
  .watch-layout { grid-template-columns: 1fr; }
}

/* ── Team panels ──────────────────────────────────────── */
.teams-scroll { display: flex; flex-direction: column; gap: 10px; max-height: calc(100vh - 120px); overflow-y: auto; padding-right: 4px; }
.teams-scroll::-webkit-scrollbar { width: 4px; }
.teams-scroll::-webkit-scrollbar-track { background: transparent; }
.teams-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 4px; }

.watch-team-row {
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 12px; padding: 12px 14px;
  transition: border-color .3s, background .3s;
}
.watch-team-row.my-team {
  border-color: rgba(0,255,136,.4);
  background: rgba(0,255,136,.06);
}
.watch-team-row.highest {
  border-color: rgba(255,215,0,.5);
  background: rgba(255,215,0,.07);
  animation: highpulse .4s ease;
}
@keyframes highpulse { 0%{transform:scale(1);} 50%{transform:scale(1.01);} 100%{transform:scale(1);} }

.wtr-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.wtr-info { display: flex; align-items: center; gap: 10px; }
.wtr-meta { font-size: .7rem; color: var(--muted); margin-bottom: 4px; }
.wtr-roster { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; max-height: 80px; overflow-y: auto; }
.roster-pill {
  background: rgba(255,255,255,.07); border-radius: 6px;
  padding: 2px 7px; font-size: .64rem; color: var(--muted);
  white-space: nowrap; transition: background .2s;
}
.roster-pill.new-player { background: rgba(0,255,136,.15); color: #00FF88; }

/* ── Sold overlay (extends base) ───────────────────────── */
.sold-overlay .sold-word { animation: wordpop .5s cubic-bezier(.175,.885,.32,1.275); }
@keyframes wordpop { 0%{transform:scale(0) rotate(-10deg);opacity:0;} 100%{transform:scale(1) rotate(0);opacity:1;} }

/* ── Unsold flash ─────────────────────────────────────── */
.unsold-flash { animation: unsoldflash 2.4s ease forwards; }
@keyframes unsoldflash {
  0%{background:rgba(255,51,102,.0);}
  15%{background:rgba(255,51,102,.18);}
  40%{background:rgba(255,51,102,.12);}
  100%{background:rgba(255,51,102,.0);}
}

/* ── Bid history ──────────────────────────────────────── */
.bid-log { background: rgba(0,0,0,.25); border-radius: 10px; padding: 12px; margin-top: 14px; max-height: 180px; overflow-y: auto; }
.bid-log::-webkit-scrollbar { width: 3px; }
.bid-log::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 3px; }

/* ── Confetti ─────────────────────────────────────────── */
.cp { position: fixed; pointer-events: none; z-index: 9999; animation: cpfall linear forwards; }
@keyframes cpfall { to { transform: translateY(110vh) rotate(720deg); opacity: 0; } }
</style>
</head>
<body class="page">

<!-- TOPBAR -->
<div class="topbar" style="position:sticky;top:0;z-index:200;">
  <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;">
    <div class="logo" style="font-size:1.1rem;">IPL <span>AUCTION</span></div>
    <div style="display:flex;align-items:center;gap:6px;font-family:'Orbitron',monospace;font-size:.8rem;font-weight:700;color:var(--red);">
      <div class="live-dot"></div>LIVE
    </div>
    <div id="a-title" style="font-family:'Rajdhani',sans-serif;font-size:.92rem;font-weight:700;color:var(--muted);"></div>
  </div>
  <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
    <!-- Viewer badge -->
    <div class="viewer-badge" id="viewer-badge">
      <div class="vb-dot"></div>
      <span>You: <strong id="vb-team">—</strong></span>
    </div>
    <!-- Scorebug -->
    <div class="scorebug">
      <div class="sb-item"><div class="sb-val" id="sb-sold">0</div><div class="sb-lbl">SOLD</div></div>
      <div class="sb-item"><div class="sb-val" id="sb-unsold">0</div><div class="sb-lbl">UNSOLD</div></div>
      <div class="sb-item"><div class="sb-val" id="sb-rem">0</div><div class="sb-lbl">REMAINING</div></div>
    </div>
    <a href="/join" class="btn btn-outline btn-sm">← LEAVE</a>
  </div>
</div>

<!-- MAIN LAYOUT -->
<div class="watch-layout">

  <!-- LEFT: Player Stage -->
  <div class="stage">
    <div style="display:flex;gap:14px;margin-bottom:16px;flex-wrap:wrap;">
      <div class="stat-chip"><div class="val" id="st-num">—</div><div class="lbl">PLAYER #</div></div>
      <div class="stat-chip"><div class="val countdown" id="countdown">—</div><div class="lbl">SECONDS</div></div>
      <div class="stat-chip"><div class="val" id="st-bid" style="color:var(--green);">—</div><div class="lbl">CURRENT BID</div></div>
    </div>

    <div class="player-card" id="player-card">
      <div class="player-photo" id="st-photo">🏏</div>
      <div class="player-name" id="st-name">Waiting for auction to start…</div>
      <div class="player-meta">
        <span class="role-badge rb-bat" id="st-role">—</span>
        <span style="color:var(--muted);font-size:.83rem;" id="st-age">Age: —</span>
        <span style="color:var(--muted);font-size:.83rem;" id="st-nat"></span>
      </div>
      <div class="base-box">
        <div class="label">Base Price</div>
        <div class="price" id="st-base">₹ —</div>
      </div>
      <div class="cur-bid" id="st-cur-bid">Waiting for auction to start…</div>
    </div>

    <!-- BID BUTTON (only for viewer's own team) -->
    <div style="margin-top:20px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;" id="bid-action-area">
      <button class="btn btn-gold" id="my-bid-btn" onclick="placeMyBid()" disabled style="font-size:1rem;padding:12px 32px;min-width:160px;">
        🏏 PLACE BID
      </button>
      <div id="bid-reason" style="display:none;background:rgba(255,51,102,.12);border:1px solid rgba(255,51,102,.3);border-radius:8px;padding:8px 16px;font-size:.78rem;color:var(--red);align-items:center;gap:6px;"></div>
    </div>

    <!-- Progress -->
    <div style="margin-top:16px;width:100%;max-width:400px;">
      <div class="prog-wrap">
        <div class="prog-labels"><span id="prog-lbl">Progress</span><span id="prog-pct">0%</span></div>
        <div class="prog-track"><div class="prog-bar" id="prog-bar" style="width:0%"></div></div>
      </div>
    </div>

    <!-- Bid History -->
    <div class="bid-log" style="max-width:460px;margin-top:16px;">
      <div class="bid-log-title">📋 Bid History</div>
      <div id="bid-entries"></div>
    </div>
  </div>

  <!-- RIGHT: Teams panel -->
  <div class="bid-panel">
    <div class="panel-hdr">
      <h3>🏆 TEAMS &amp; SQUADS</h3>
      <div style="font-size:.72rem;color:var(--muted);margin-top:3px;">Live budgets &amp; player rosters</div>
    </div>
    <div class="teams-scroll" id="teams-list"></div>

    <div class="panel-footer" style="margin-top:14px;">
      <a href="/join" class="btn btn-outline btn-sm">← LEAVE AUCTION</a>
    </div>
  </div>
</div>

<!-- SOLD / UNSOLD OVERLAY -->
<div class="sold-overlay" id="sold-overlay">
  <div class="confetti-wrap" id="confetti-wrap"></div>
  <div class="sold-word" id="sold-word">SOLD!</div>
  <div style="text-align:center;">
    <div style="font-family:'Rajdhani',sans-serif;font-size:1.8rem;font-weight:700;" id="sold-pname">—</div>
    <div style="font-family:'Orbitron',monospace;font-size:1.2rem;color:var(--green);margin-top:8px;" id="sold-price">₹ 0Cr</div>
    <div style="font-family:'Rajdhani',sans-serif;font-size:1.1rem;color:var(--cyan);margin-top:5px;" id="sold-team">—</div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── Identity from localStorage ────────────────────────────────────────────────
const AID       = parseInt(location.pathname.split('/').pop());
const MY_TEAM_ID = parseInt(localStorage.getItem('viewer_team_id') || '0');
const MY_TEAM_NAME = localStorage.getItem('viewer_team_name') || 'Unknown Team';

// Guard: if no identity saved, redirect to join
if (!MY_TEAM_ID || !AID) { location.href = '/join'; }

document.getElementById('vb-team').textContent   = MY_TEAM_NAME;

const socket = io();
let teams = [], currentPlayer = null, currentBid = 0, currentBidder = null;
let cdInterval = null, cdVal = 30, playerIdx = 0, totalPlayers = 0;
let maxPlayersPerTeam = 11, bidIncrement = 0.25;
let teamPlayerCounts = {};
let soldPlayersMap = {};  // teamId → [player, ...]
const RCL = { Batsman:'rb-bat', Bowler:'rb-bowl', 'All-Rounder':'rb-all', 'Wicket-Keeper':'rb-wk' };

socket.emit('join_auction', { auctionId: AID });

// ── Socket events ─────────────────────────────────────────────────────────────
socket.on('auction_state', (state) => {
  teams = state.teams;
  if (state.auction) {
    document.getElementById('a-title').textContent = state.auction.name;
    maxPlayersPerTeam = state.auction.max_players_per_team || 11;
    bidIncrement      = state.auction.bid_increment || 0.25;
  }
  if (state.playerCounts) teamPlayerCounts = state.playerCounts;
  totalPlayers = (state.pending_count || 0) + (state.sold_count || 0) + (state.unsold_count || 0);

  document.getElementById('sb-sold').textContent   = state.sold_count   || 0;
  document.getElementById('sb-unsold').textContent = state.unsold_count || 0;
  document.getElementById('sb-rem').textContent    = state.pending_count || 0;

  // Rebuild sold players map
  soldPlayersMap = {};
  if (state.soldPlayers) {
    state.soldPlayers.forEach(p => {
      if (!soldPlayersMap[p.sold_to_team_id]) soldPlayersMap[p.sold_to_team_id] = [];
      soldPlayersMap[p.sold_to_team_id].push(p);
    });
  }

  // If there's an active player in the room, restore state
  if (state.room && state.room.currentPlayer) {
    currentPlayer = state.room.currentPlayer;
    currentBid    = state.room.currentBid;
    currentBidder = state.room.currentBidder;
    renderCurrentPlayer(currentPlayer, currentBid);
    refreshMyBidButton();
  }

  renderTeams();
});

socket.on('player_up', ({ player, base_price }) => {
  currentPlayer = player;
  currentBid    = base_price;
  currentBidder = null;
  playerIdx++;

  renderCurrentPlayer(player, base_price);
  document.getElementById('st-cur-bid').textContent = 'No bids yet — Auction is live!';
  document.getElementById('st-num').textContent = playerIdx;

  const done = parseInt(document.getElementById('sb-sold').textContent) + parseInt(document.getElementById('sb-unsold').textContent);
  const pct  = totalPlayers ? Math.round(done / totalPlayers * 100) : 0;
  document.getElementById('prog-bar').style.width = pct + '%';
  document.getElementById('prog-lbl').textContent = `${done} / ${totalPlayers} players`;
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('sb-rem').textContent = Math.max(0, totalPlayers - done - 1);

  document.getElementById('bid-entries').innerHTML = '';
  refreshMyBidButton();
  startCountdown();
});

socket.on('bid_placed', ({ teamId, teamName, bidAmount }) => {
  currentBid    = bidAmount;
  currentBidder = teamId;

  document.getElementById('st-cur-bid').textContent = `${teamName}: ₹${bidAmount}Cr`;
  document.getElementById('st-bid').textContent = `₹${bidAmount}Cr`;

  // Highlight leading team row
  document.querySelectorAll('.watch-team-row').forEach(r => r.classList.remove('highest'));
  const row = document.querySelector(`[data-team-id="${teamId}"]`);
  if (row) row.classList.add('highest');

  addBidLog(`${teamName}: ₹${bidAmount}Cr`);
  refreshMyBidButton();
  startCountdown();
});

socket.on('bid_reset', ({ base_price }) => {
  currentBid    = base_price;
  currentBidder = null;
  document.getElementById('st-cur-bid').textContent = 'Bid reset — place your bid!';
  document.getElementById('st-bid').textContent = `₹${base_price}Cr`;
  document.querySelectorAll('.watch-team-row').forEach(r => r.classList.remove('highest'));
  addBidLog('Bid reset by auctioneer');
  refreshMyBidButton();
  startCountdown();
});

socket.on('player_sold', ({ player, team, price, sold_count, playerCounts }) => {
  clearInterval(cdInterval);

  // Update local team data
  const t = teams.find(x => x.id === team.id);
  if (t) t.spent += price;
  if (playerCounts) teamPlayerCounts = playerCounts;

  // Add to roster map
  if (!soldPlayersMap[team.id]) soldPlayersMap[team.id] = [];
  soldPlayersMap[team.id].push({ ...player, sold_to_team_id: team.id });

  document.getElementById('sb-sold').textContent = sold_count;
  showOverlay('SOLD!', player.name, `₹${price}Cr`, team.name, true);
  confetti();
  renderTeams();

  setTimeout(() => {
    hideOverlay();
    currentPlayer = null; currentBid = 0; currentBidder = null;
    refreshMyBidButton();
  }, 2800);
});

socket.on('player_unsold', ({ player, unsold_count }) => {
  clearInterval(cdInterval);
  document.getElementById('sb-unsold').textContent = unsold_count;
  showOverlay('UNSOLD', player.name, '', '', false);
  document.getElementById('player-card').classList.add('unsold-flash');
  setTimeout(() => {
    hideOverlay();
    document.getElementById('player-card').classList.remove('unsold-flash');
    currentPlayer = null; currentBid = 0; currentBidder = null;
    refreshMyBidButton();
  }, 2500);
});

socket.on('reshuffle', ({ count, reshuffleCount }) => {
  const msg = reshuffleCount >= 1
    ? `🔄 ${count} unsold players reshuffled! (Round ${reshuffleCount}/2 — auto-assign next!)`
    : `🔄 ${count} unsold players reshuffled!`;
  showToast(msg);
});

socket.on('auto_assign', ({ assignments }) => {
  assignments.forEach(({ player, team }) => {
    if (!soldPlayersMap[team.id]) soldPlayersMap[team.id] = [];
    soldPlayersMap[team.id].push({ ...player, sold_to_team_id: team.id });
    addBidLog(`🤝 AUTO: ${player.name} → ${team.name}`);
  });
  showToast(`🤝 ${assignments.length} player(s) auto-assigned to teams!`);
  renderTeams();
});

socket.on('auction_complete', () => {
  clearInterval(cdInterval);
  showToast('🏆 AUCTION COMPLETE!');
  setTimeout(() => location.href = `/results/${AID}`, 2500);
});

socket.on('bid_error', ({ error }) => showToast(`⚠️ ${error}`));

// ── Render helpers ────────────────────────────────────────────────────────────
function renderCurrentPlayer(player, base_price) {
  const photo = document.getElementById('st-photo');
  if (player.photo_path) {
    photo.innerHTML = `<img src="${player.photo_path}" alt="${player.name}">`;
  } else {
    const e = { Batsman:'🏏', Bowler:'🎳', 'All-Rounder':'⭐', 'Wicket-Keeper':'🧤' };
    photo.textContent = e[player.role] || '🏏';
  }
  document.getElementById('st-name').textContent = player.name;
  const roleEl = document.getElementById('st-role');
  roleEl.className = `role-badge ${RCL[player.role] || 'rb-bat'}`;
  roleEl.textContent = player.role;
  document.getElementById('st-age').textContent = `Age: ${player.age || '—'}`;
  document.getElementById('st-nat').textContent = player.nationality ? `· ${player.nationality}` : '';
  document.getElementById('st-base').textContent = `₹${base_price}Cr`;
  document.getElementById('st-bid').textContent  = `₹${base_price}Cr`;
}

function renderTeams() {
  const list = document.getElementById('teams-list');
  if (!teams.length) { list.innerHTML = '<div style="color:var(--muted);text-align:center;padding:20px;">Loading teams…</div>'; return; }

  list.innerHTML = teams.map(t => {
    const isMyTeam    = t.id === MY_TEAM_ID;
    const squadCount  = teamPlayerCounts[t.id] || 0;
    const remaining   = (t.purse - t.spent).toFixed(2);
    const roster      = soldPlayersMap[t.id] || [];
    const isFull      = squadCount >= maxPlayersPerTeam;
    const isBroke     = (t.purse - t.spent) <= 0;
    const statusTag   = isFull ? '🔒 FULL' : isBroke ? '💸 NO FUNDS' : '';

    return `
    <div class="watch-team-row${isMyTeam ? ' my-team' : ''}" id="trow-${t.id}" data-team-id="${t.id}">
      <div class="wtr-header">
        <div class="wtr-info">
          <div class="mini-logo">${t.logo_path ? `<img src="${t.logo_path}">` : (t.emoji || '🏏')}</div>
          <div>
            <div style="font-family:'Rajdhani',sans-serif;font-size:.93rem;font-weight:700;">
              ${t.name}
              ${isMyTeam ? `<span style="font-size:.65rem;color:#00FF88;background:rgba(0,255,136,.15);padding:1px 7px;border-radius:10px;margin-left:5px;">YOU</span>` : ''}
            </div>
            <div class="wtr-meta">
              💰 ₹<span id="rem-${t.id}">${remaining}</span>Cr &nbsp;·&nbsp;
              👥 <span id="sq-${t.id}">${squadCount}/${maxPlayersPerTeam}</span>
              ${statusTag ? `&nbsp;·&nbsp;<span style="color:var(--red);font-weight:700;font-size:.65rem;">${statusTag}</span>` : ''}
            </div>
          </div>
        </div>
      </div>
      ${roster.length ? `
      <div class="wtr-roster" id="roster-${t.id}">
        ${roster.map(p => `<span class="roster-pill">${p.name}</span>`).join('')}
      </div>` : `<div style="font-size:.68rem;color:var(--muted);padding:4px 0;">No players yet</div>`}
    </div>`;
  }).join('');
}

// ── My bid button logic ────────────────────────────────────────────────────────
function getMyTeam() { return teams.find(t => t.id === MY_TEAM_ID); }

function refreshMyBidButton() {
  const btn      = document.getElementById('my-bid-btn');
  const reasonEl = document.getElementById('bid-reason');
  const myTeam   = getMyTeam();

  if (!currentPlayer || !myTeam) {
    btn.disabled = true;
    btn.textContent = '🏏 PLACE BID';
    reasonEl.style.display = 'none';
    return;
  }

  const isFull      = (teamPlayerCounts[MY_TEAM_ID] || 0) >= maxPlayersPerTeam;
  const nextBid     = currentBidder === null ? currentPlayer.base_price : parseFloat((currentBid + bidIncrement).toFixed(2));
  const cantAfford  = (myTeam.purse - myTeam.spent) < nextBid;
  const isLeading   = currentBidder === MY_TEAM_ID;

  let reason = null;
  if (isFull)     reason = '🔒 Squad full — cannot bid';
  else if (cantAfford) reason = `💸 Insufficient purse (₹${(myTeam.purse - myTeam.spent).toFixed(2)}Cr left)`;
  else if (isLeading)  reason = null;

  const disabled = isFull || cantAfford;
  btn.disabled = disabled;

  if (isLeading) {
    btn.textContent = `✅ Leading — ₹${nextBid}Cr`;
  } else {
    btn.textContent = `🏏 BID ₹${nextBid}Cr`;
  }

  if (reason) {
    reasonEl.innerHTML = reason;
    reasonEl.style.display = 'flex';
  } else {
    reasonEl.style.display = 'none';
  }
}

function placeMyBid() {
  if (!currentPlayer) return;
  const myTeam  = getMyTeam();
  if (!myTeam) return;
  const nextBid = currentBidder === null
    ? currentPlayer.base_price
    : parseFloat((currentBid + bidIncrement).toFixed(2));
  if ((myTeam.purse - myTeam.spent) < nextBid) { showToast('Insufficient purse!'); return; }
  if ((teamPlayerCounts[MY_TEAM_ID] || 0) >= maxPlayersPerTeam) { showToast('Squad is full!'); return; }
  socket.emit('place_bid', { auctionId: AID, teamId: MY_TEAM_ID, bidAmount: nextBid });
}

// ── Countdown ─────────────────────────────────────────────────────────────────
function startCountdown() {
  cdVal = 30;
  const el = document.getElementById('countdown');
  el.textContent = cdVal;
  el.className = 'val countdown';
  clearInterval(cdInterval);
  cdInterval = setInterval(() => {
    cdVal--;
    el.textContent = cdVal;
    if (cdVal <= 10) el.className = 'val countdown urgent';
    if (cdVal <= 0)  { clearInterval(cdInterval); }
  }, 1000);
}

// ── Overlays ──────────────────────────────────────────────────────────────────
function showOverlay(word, name, price, team, isSold) {
  document.getElementById('sold-word').textContent = word;
  document.getElementById('sold-word').style.color = isSold ? 'var(--gold)' : 'var(--red)';
  document.getElementById('sold-pname').textContent = name;
  document.getElementById('sold-price').textContent = price;
  document.getElementById('sold-team').textContent  = team;
  document.getElementById('sold-overlay').classList.add('show');
}
function hideOverlay() { document.getElementById('sold-overlay').classList.remove('show'); }

function confetti() {
  const wrap = document.getElementById('confetti-wrap'); wrap.innerHTML = '';
  const colors = ['#FFD700','#00FFFF','#FF3366','#00FF88','#BF5FFF'];
  for (let i = 0; i < 70; i++) {
    const el = document.createElement('div'); el.className = 'cp';
    el.style.cssText = `left:${Math.random()*100}%;top:-20px;background:${colors[i%5]};width:${Math.random()*10+6}px;height:${Math.random()*10+6}px;border-radius:${Math.random()>.5?'50%':'3px'};animation-delay:${Math.random()}s;animation-duration:${Math.random()*2.5+1.5}s;`;
    wrap.appendChild(el);
  }
}

// ── Bid log ───────────────────────────────────────────────────────────────────
function addBidLog(text) {
  const el = document.createElement('div');
  el.className = 'blog-entry';
  el.innerHTML = `<div class="blog-dot"></div>${text}`;
  const entries = document.getElementById('bid-entries');
  entries.insertBefore(el, entries.firstChild);
}

function showToast(msg) {
  const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}
</script>
