<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPL Auction — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/main.css">
</head>
<body class="center-page">
<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <span class="big-icon">🏏</span>
      <h1>IPL AUCTION</h1>
      <p>Live Cricket Mega Auction · SQLite Powered</p>
    </div>
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('login',this)">LOGIN</button>
      <button class="tab-btn" onclick="switchTab('register',this)">REGISTER</button>
    </div>

    <!-- LOGIN -->
    <div id="pane-login">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="l-email" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="l-pwd" placeholder="••••••••">
      </div>
      <div class="error-msg" id="l-err"></div>
      <button class="btn btn-primary btn-full mt16" onclick="doLogin()">⚡ ENTER AUCTION ROOM</button>
    </div>

    <!-- REGISTER -->
    <div id="pane-register" style="display:none;">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="r-name" placeholder="Your Name">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="r-email" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" id="r-phone" placeholder="+91 99999 99999">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="r-pwd" placeholder="Min 6 characters">
      </div>
      <div class="error-msg" id="r-err"></div>
      <div class="success-msg" id="r-ok"></div>
      <button class="btn btn-gold btn-full mt16" onclick="doRegister()">🚀 CREATE ACCOUNT</button>
    </div>
  </div>
</div>

<script>
function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('pane-login').style.display    = tab === 'login'    ? 'block' : 'none';
  document.getElementById('pane-register').style.display = tab === 'register' ? 'block' : 'none';
}

async function doLogin() {
  const email = document.getElementById('l-email').value.trim();
  const password = document.getElementById('l-pwd').value;
  const err = document.getElementById('l-err');
  err.style.display = 'none';
  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await r.json();
    if (!r.ok) { err.textContent = data.error; err.style.display = 'block'; return; }
    window.location.href = '/dashboard';
  } catch (e) { err.textContent = 'Server error'; err.style.display = 'block'; }
}

async function doRegister() {
  const name = document.getElementById('r-name').value.trim();
  const email = document.getElementById('r-email').value.trim();
  const phone = document.getElementById('r-phone').value.trim();
  const password = document.getElementById('r-pwd').value;
  const err = document.getElementById('r-err');
  const ok = document.getElementById('r-ok');
  err.style.display = 'none'; ok.style.display = 'none';
  try {
    const r = await fetch('/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, phone, password })
    });
    const data = await r.json();
    if (!r.ok) { err.textContent = data.error; err.style.display = 'block'; return; }
    ok.textContent = data.message; ok.style.display = 'block';
    setTimeout(() => switchTab('login', document.querySelector('.tab-btn')), 1500);
  } catch (e) { err.textContent = 'Server error'; err.style.display = 'block'; }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') { const l = document.getElementById('pane-login'); if (l.style.display !== 'none') doLogin(); else doRegister(); } });
</script>
</body>
</html>
